spring.application.name=oci-server

# 针对 N2830 + 4GB RAM 低配机器的优化配置
server.port=9856
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=2
server.tomcat.accept-count=10
server.tomcat.connection-timeout=20000

# Spring Boot 优化
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# 日志优化 - 降低日志级别减少 I/O 开销
logging.level.root=WARN
logging.level.com.doubledimple.ociserver=INFO
logging.level.com.oracle.bmc=WARN
logging.level.org.springframework=WARN
logging.level.org.apache=WARN

# H2 数据库优化
spring.datasource.url=jdbc:h2:file:./data/oci-start;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CACHE_SIZE=32768
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP 连接池优化（低配机器）
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=OciHikariCP
