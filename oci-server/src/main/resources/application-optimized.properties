server.port=9856
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

spring.application.name=oci-server

# JVM 优化参数建议在启动脚本中添加：
# -Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError

# 线程池优化配置
async.executor.core-pool-size=5
async.executor.max-pool-size=20
async.executor.queue-capacity=100
async.executor.thread-name-prefix=oci-async-
async.executor.keep-alive-seconds=60

# OCI SDK 客户端池化配置
oci.client.pool.max-total=50
oci.client.pool.max-idle=20
oci.client.pool.min-idle=5
oci.client.pool.max-wait-millis=30000

# 日志级别优化（生产环境建议改为 WARN）
logging.level.root=WARN
logging.level.com.doubledimple.ociserver=INFO
logging.level.com.oracle.bmc=WARN
logging.level.org.springframework=WARN

# H2 数据库优化
spring.datasource.url=jdbc:h2:file:./data/oci-start;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CACHE_SIZE=65536
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=OciHikariCP

# Spring Boot 优化
spring.main.lazy-initialization=true
spring.jmx.enabled=false
spring.devtools.restart.enabled=false